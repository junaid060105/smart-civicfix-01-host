<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Smart CivicFix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="signup.css">
  <style>
    .icon-inline { display: inline-flex; align-items: center; vertical-align: middle; }
    .icon-inline svg { width: 1em; height: 1em; stroke-width: 1.8; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-border);
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--gray-border);
      border-radius: 4px;
      background: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .google-btn:hover {
      border-color: #4285f4;
      background: #f8faff;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(66,133,244,0.15);
    }
    .google-btn svg { flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .terms-text {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 16px;
      line-height: 1.5;
    }
    .terms-text a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
    }
    .terms-text a:hover { text-decoration: underline; }
  </style>
</head>

<body class="login-page">

<div class="login-container">
  <div class="floating-orb orb-1"></div>
  <div class="floating-orb orb-2"></div>
  <div class="floating-orb orb-3"></div>
  <div class="gov-banner" style="background-color: var(--white);">
    <div class="container">
      <span class="flag-icon icon-inline"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/><rect x="2" y="18" width="20" height="4"/><rect x="2" y="7" width="20" height="4"/></svg></span> 
      <span class="banner-text">An official platform of the municipal government</span>
    </div>
  </div>

  <div class="login-content">
    <form class="login-box" onsubmit="signup(event)">
      
      <h2>Create Account <span class="icon-inline" style="margin-left: 4px;"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg></span></h2>
      <p>Register to report issues and track progress.</p>

      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="password" placeholder="Password" required>

      <button type="submit" class="btn-primary">Create Account</button>

      <div class="divider">or</div>

      <button type="button" class="google-btn" onclick="socialLogin('google')">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A11.96 11.96 0 0 0 1 12c0 1.94.47 3.77 1.18 5.42l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign up with Google
      </button>

      <button type="button" class="google-btn" style="margin-top:10px;" onclick="socialLogin('apple')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#000">
          <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
        </svg>
        Sign up with Apple
      </button>

      <p class="terms-text">
        By creating an account, you agree to our<br>
        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </p>

      <p class="extra-text">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>

    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
