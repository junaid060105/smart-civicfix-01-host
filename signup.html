<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Smart CivicFix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="signup.css">
  <style>
    .icon-inline { display: inline-flex; align-items: center; vertical-align: middle; }
    .icon-inline svg { width: 1em; height: 1em; stroke-width: 1.8; }
  </style>
</head>

<body class="login-page">

<div class="login-container">
  <!-- Floating background orbs -->
  <div class="floating-orb orb-1"></div>
  <div class="floating-orb orb-2"></div>
  <div class="floating-orb orb-3"></div>
  <div class="gov-banner" style="background-color: var(--white);">
    <div class="container">
      <span class="flag-icon icon-inline"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/><rect x="2" y="18" width="20" height="4"/><rect x="2" y="7" width="20" height="4"/></svg></span> 
      <span class="banner-text">An official platform of the municipal government</span>
    </div>
  </div>

  <div class="login-content">
    <form class="login-box" onsubmit="signup(event)">
      
      <h2>Create Account <span class="icon-inline" style="margin-left: 4px;"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg></span></h2>
      <p>Register to report issues and track progress.</p>

      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="password" placeholder="Password" required>

      <button type="submit" class="btn-primary">Sign up</button>

      <p class="extra-text">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>

    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
