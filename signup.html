<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Smart CivicFix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="signup.css">
</head>

<body class="login-page">

<div class="login-container">
  <!-- Floating background orbs -->
  <div class="floating-orb orb-1"></div>
  <div class="floating-orb orb-2"></div>
  <div class="floating-orb orb-3"></div>
  <div class="gov-banner" style="background-color: var(--white);">
    <div class="container">
      <span class="flag-icon">🏛️</span> 
      <span class="banner-text">An official platform of the municipal government</span>
    </div>
  </div>

  <div class="login-content">
    <form class="login-box" onsubmit="signup(event)">
      
      <h2>Create Account 🚀</h2>
      <p>Register to report issues and track progress.</p>

      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="password" placeholder="Password" required>

      <button type="submit" class="btn-primary">Sign up</button>

      <p class="extra-text">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>

    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
