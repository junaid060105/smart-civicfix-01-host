<!DOCTYPE html>
<html>
<head>
  <title>Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
      color: white;
      padding: 30px 20px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      position: relative;
    }

    .sidebar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    .sidebar > * {
      position: relative;
      z-index: 1;
    }

    .sidebar h2 {
      font-size: 24px;
      margin-bottom: 40px;
      text-align: center;
      border-bottom: 2px solid rgba(255,255,255,0.2);
      padding-bottom: 15px;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      margin: 15px 0;
      padding: 12px 15px;
      border-radius: 8px;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.1);
      color: white;
      transform: translateX(5px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .sidebar a.active {
      background: #3498db;
      color: white;
    }

    .sidebar a i {
      margin-right: 12px;
      width: 20px;
      text-align: center;
    }

    .main {
      flex: 1;
      padding: 30px;
      background: #f8f9fa;
    }

    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header h1 {
      font-size: 28px;
      color: #2c3e50;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
      color: #2c3e50;
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #3498db;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
    }

    .logout-btn {
      background: #e74c3c;
      border: none;
      color: white;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .logout-btn:hover {
      background: #c9302c;
    }

    .settings-panel {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    .settings-panel h3 {
      margin-bottom: 20px;
      font-size: 22px;
      color: #2c3e50;
    }

    .settings-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px;
      border-radius: 15px;
      background: #f7fbff;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    .settings-card h3 {
      margin: 0;
      color: #2c3e50;
    }

    .settings-card p {
      margin: 8px 0 0;
      color: #7f8c8d;
      font-size: 14px;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .toggle-label {
      font-weight: 600;
      color: #2c3e50;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #ecf0f1;
      border-radius: 999px;
      transition: background 0.3s ease;
    }

    .slider::before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s ease;
      box-shadow: 0 3px 8px rgba(0,0,0,0.12);
    }

    .toggle-switch input:checked + .slider {
      background: #3498db;
    }

    .toggle-switch input:checked + .slider::before {
      transform: translateX(22px);
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        padding: 20px;
      }

      .main {
        padding: 20px;
      }

      .header {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h2><i class="fas fa-tachometer-alt"></i> Admin Panel</h2>
      <a href="admin-index.html"><i class="fas fa-home"></i> Dashboard</a>
      <a href="admin-complaints.html"><i class="fas fa-exclamation-triangle"></i> Complaints</a>
      <a href="admin-users.html"><i class="fas fa-users"></i> Users</a>
      <a href="#" class="active"><i class="fas fa-cog"></i> Settings</a>
    </div>

    <div class="main">
      <div class="header">
        <h1><i class="fas fa-cog"></i> Settings</h1>
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">A</div>
          <div>
            <strong id="user-name">Admin User</strong>
            <br>
            <small>Administrator</small>
          </div>
          <button id="logout-btn" class="logout-btn" title="Logout">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>

      <div class="settings-panel" id="settings-page">
        <h3>Display Settings</h3>
        <div class="settings-card">
          <div>
            <h3>Dark Mode</h3>
            <p>Switch the dashboard theme for easier viewing at night.</p>
          </div>
          <div class="toggle-group">
            <span class="toggle-label">Dark mode</span>
            <label class="toggle-switch">
              <input id="dark-mode-toggle" type="checkbox">
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="admin-auth.js"></script>
</body>
</html>
