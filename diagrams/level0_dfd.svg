<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="Georgia, serif">

  <!-- Background -->
  <rect width="900" height="520" fill="#FAFBFF" rx="12"/>

  <!-- Outer border -->
  <rect x="20" y="20" width="860" height="480" fill="none" stroke="#2C3E6B" stroke-width="2" rx="8"/>

  <!-- Title -->
  <text x="450" y="55" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C3E6B" letter-spacing="1">COMPLAINT MANAGEMENT PROCESS — LEVEL 0 DFD</text>
  <line x1="180" y1="62" x2="720" y2="62" stroke="#2C3E6B" stroke-width="1"/>

  <!-- ═══════════════ CENTRAL SYSTEM (circle) ═══════════════ -->
  <circle cx="450" cy="260" r="90" fill="#EEF2FF" stroke="#2C3E6B" stroke-width="2.5"/>
  <text x="450" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E6B">Smart CivicFix</text>
  <text x="450" y="268" text-anchor="middle" font-size="11" fill="#444">Civic Complaint</text>
  <text x="450" y="284" text-anchor="middle" font-size="11" fill="#444">Management System</text>

  <!-- ═══════════════ CITIZEN (left rectangle) ═══════════════ -->
  <rect x="60" y="220" width="150" height="80" rx="6" fill="#E8F5E9" stroke="#2C3E6B" stroke-width="2"/>
  <text x="135" y="256" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C3E6B">Citizens</text>
  <text x="135" y="276" text-anchor="middle" font-size="11" fill="#555">(External Entity)</text>

  <!-- ═══════════════ MUNICIPAL (right rectangle) ═══════════════ -->
  <rect x="690" y="220" width="170" height="80" rx="6" fill="#FFF3E0" stroke="#2C3E6B" stroke-width="2"/>
  <text x="775" y="256" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C3E6B">Municipal</text>
  <text x="775" y="272" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C3E6B">Authorities</text>
  <text x="775" y="290" text-anchor="middle" font-size="11" fill="#555">(External Entity)</text>

  <!-- ═══════════════ ARROWS ═══════════════ -->

  <!-- 1. Citizen → System: Submit Complaint (upper arrow going right) -->
  <path d="M210,245 Q320,195 358,230" fill="none" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="195" y="188" width="148" height="28" rx="4" fill="#DCEEFF" stroke="#1565C0" stroke-width="1"/>
  <text x="269" y="206" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold">Submit Complaint</text>

  <!-- 2. System → Citizen: Status Updates (lower arrow going left) -->
  <path d="M362,292 Q300,340 210,305" fill="none" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="195" y="318" width="148" height="28" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="269" y="336" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">Status Updates</text>

  <!-- 3. System → Municipal: Forward Complaint (upper arrow going right) -->
  <path d="M540,232 Q610,192 690,235" fill="none" stroke="#E65100" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="558" y="188" width="148" height="28" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="632" y="206" text-anchor="middle" font-size="11" fill="#E65100" font-weight="bold">Forward Complaint</text>

  <!-- 4. Municipal → System: Update Status (lower arrow going left) -->
  <path d="M690,295 Q630,345 542,292" fill="none" stroke="#6A1B9A" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="558" y="318" width="148" height="28" rx="4" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1"/>
  <text x="632" y="336" text-anchor="middle" font-size="11" fill="#6A1B9A" font-weight="bold">Update Complaint Status</text>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <rect x="40" y="420" width="820" height="60" rx="6" fill="#F0F4FF" stroke="#CBD5E8" stroke-width="1"/>
  <text x="70" y="443" font-size="11" font-weight="bold" fill="#2C3E6B">LEGEND:</text>

  <!-- Legend items -->
  <line x1="130" y1="440" x2="160" y2="440" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="168" y="444" font-size="10" fill="#333">Submit Complaint</text>

  <line x1="290" y1="440" x2="320" y2="440" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="328" y="444" font-size="10" fill="#333">Status Updates</text>

  <line x1="440" y1="440" x2="470" y2="440" stroke="#E65100" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="478" y="444" font-size="10" fill="#333">Forward Complaint</text>

  <line x1="610" y1="440" x2="640" y2="440" stroke="#6A1B9A" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="648" y="444" font-size="10" fill="#333">Update Complaint Status</text>

  <text x="70" y="468" font-size="10" fill="#555">Rectangle = External Entity &nbsp;&nbsp;|&nbsp;&nbsp; Circle = Process (System)</text>

  <!-- ═══════════════ ARROW MARKERS ═══════════════ -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6A1B9A"/>
    </marker>
  </defs>

</svg>
