<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Smart CivicFix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-container">
  <div class="gov-banner" style="background-color: var(--white);">
    <div class="container">
      <span class="flag-icon">🏛️</span> 
      <span class="banner-text">An official platform of the municipal government</span>
    </div>
  </div>

  <div class="login-content">
    <form class="login-box" id="loginForm">
      
      <h2>Welcome Back 👋</h2>
      <p>Sign in to your official citizen account.</p>

      <div id="loginError" class="error-msg" style="display:none;"></div>

      <input type="email" id="loginEmail" placeholder="Email Address" required>
      <input type="password" id="loginPassword" placeholder="Password" required>

      <button type="submit" class="btn-primary" id="loginBtn">Sign in</button>

      <p class="extra-text">
        Don't have an account?
        <a href="signup.html">Create account</a>
      </p>

    </form>
  </div>
</div>

<script src="aws-config.js"></script>
<script src="api.js"></script>
<script>
  // If already logged in, redirect
  if (Auth.isLoggedIn()) {
    window.location.href = "dashboard.html";
  }

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById("loginError");
    const btn = document.getElementById("loginBtn");

    errorEl.style.display = "none";
    btn.disabled = true;
    btn.textContent = "Signing in...";

    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;

    try {
      const user = await Auth.signIn(email, password);

      // Redirect based on role
      if (user.groups.includes("admin")) {
        window.location.href = "admin-dashboard.html";
      } else {
        window.location.href = "dashboard.html";
      }

    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Sign in";
    }
  });
</script>
</body>
</html>
