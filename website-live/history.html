<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Previous Issues - Smart CivicFix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="history.css">
</head>

<body>

  <div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="brand">
        <h2>Smart CivicFix</h2>
      </div>
      <div class="sidebar-links">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="complaint.html">📢 Report Issue</a>
        <a href="track.html">📍 Track Issue</a>
        <a href="history.html" class="active">📄 Previous Issues</a>
        <a href="reward.html">🎁 Rewards</a>
      </div>
      <a href="#" class="logout" onclick="Auth.signOut(); return false;">🚪 Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

      <div class="history-header">
        <div>
          <h2>📄 Previous Issues</h2>
          <p>Review all your civic reports and their resolution status</p>
        </div>
        <div class="history-stats" id="historyStats">
          <span class="h-stat"><strong id="hTotal">—</strong> Total</span>
          <span class="h-stat resolved"><strong id="hResolved">—</strong> Resolved</span>
          <span class="h-stat progress"><strong id="hProgress">—</strong> In Progress</span>
          <span class="h-stat pending"><strong id="hReported">—</strong> Reported</span>
        </div>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="resolved">✅ Resolved</button>
        <button class="filter-btn" data-filter="in-progress">⏳ In Progress</button>
        <button class="filter-btn" data-filter="reported">📋 Reported</button>
      </div>

      <!-- Issue list — dynamically populated -->
      <div class="issue-list" id="issueList">
        <div id="issueLoading" style="text-align: center; padding: 40px; color: var(--text-muted);">
          Loading your issues...
        </div>
      </div>

    </div>
  </div>

  <script src="aws-config.js"></script>
  <script src="api.js"></script>
  <script src="script.js"></script>
  <script>
    if (!Auth.requireAuth()) {
      // redirects
    } else {
      loadHistory();
    }

    async function loadHistory() {
      const user = Auth.getCurrentUser();
      if (!user) return;

      try {
        const issues = await API.getUserIssues(user.userId);

        // Update stats
        const total = issues.length;
        const resolved = issues.filter(i => i.status === "resolved").length;
        const inProgress = issues.filter(i => i.status === "in-progress").length;
        const reported = issues.filter(i => i.status === "reported").length;

        document.getElementById("hTotal").textContent = total;
        document.getElementById("hResolved").textContent = resolved;
        document.getElementById("hProgress").textContent = inProgress;
        document.getElementById("hReported").textContent = reported;

        const issueList = document.getElementById("issueList");

        if (issues.length === 0) {
          issueList.innerHTML = `
            <div style="text-align: center; padding: 50px; color: var(--text-muted);">
              <p style="font-size: 48px; margin-bottom: 12px;">📋</p>
              <p style="font-size: 16px;">You haven't reported any issues yet.</p>
              <a href="complaint.html" class="btn-primary" style="display: inline-block; margin-top: 16px; text-decoration: none; padding: 10px 24px;">Report Your First Issue</a>
            </div>
          `;
          return;
        }

        // Sort by date (newest first)
        issues.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

        issueList.innerHTML = issues.map(issue => {
          const isResolved = issue.status === "resolved";
          const isProgress = issue.status === "in-progress";
          const statusClass = isResolved ? "resolved" : isProgress ? "in-progress" : "reported";
          const emoji = isResolved ? "✅" : isProgress ? "⏳" : "📋";
          const statusText = isResolved ? "Resolved" : isProgress ? "In Progress" : "Reported";
          const dateStr = new Date(issue.createdAt).toLocaleDateString("en-IN", {
            year: "numeric", month: "short", day: "numeric"
          });

          return `
            <div class="issue-row" data-status="${statusClass}">
              <div class="issue-row-left">
                <span class="issue-badge ${statusClass}">${emoji}</span>
                <div class="issue-info">
                  <p class="issue-title">${issue.type}</p>
                  <p class="issue-location">📍 ${issue.location}</p>
                </div>
              </div>
              <div class="issue-row-mid">
                <p class="issue-ref">${issue.refId}</p>
                <p class="issue-date">${dateStr}</p>
              </div>
              <div class="issue-row-right">
                <span class="status-pill ${statusClass}">${statusText}</span>
                ${isResolved 
                  ? '<span class="pts-earned">+20 pts</span>' 
                  : isProgress 
                    ? '<a href="track.html" class="track-link">Track →</a>' 
                    : ''
                }
              </div>
            </div>
          `;
        }).join("");

        // Re-attach filter logic
        setupFilters();

      } catch (err) {
        console.error("History load error:", err);
        document.getElementById("issueList").innerHTML = `
          <div style="text-align: center; padding: 40px; color: #ef4444;">
            <p>Unable to load issues. Please try again later.</p>
          </div>
        `;
      }
    }

    function setupFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const filter = btn.dataset.filter;
          document.querySelectorAll('.issue-row').forEach(row => {
            row.style.display = (filter === 'all' || row.dataset.status === filter) ? 'flex' : 'none';
          });
        });
      });
    }
  </script>
</body>

</html>
