<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Track Issue - Smart CivicFix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="track.css">
</head>

<body class="track-page">

  <div class="track-container">
    <div class="track-wrapper">
      <a href="dashboard.html" class="back-link">← Back to Dashboard</a>

      <div class="track-box">

        <h2>📍 Track Your Issue</h2>
        <p class="subtitle">Check current resolution status</p>

        <!-- Search -->
        <div class="form-group" style="display: flex; gap: 10px;">
          <input type="text" placeholder="Enter Reference ID (e.g. CF-M5K2X)" class="search-input" id="trackInput"
            style="flex: 1;">
          <button class="btn-primary" id="searchBtn" onclick="searchIssue()" style="white-space: nowrap;">Search</button>
        </div>

        <!-- No result message -->
        <div id="noResult" style="display: none; text-align: center; padding: 20px; color: var(--text-muted);">
          <p style="font-size: 48px; margin-bottom: 10px;">🔍</p>
          <p>No issue found with that reference ID. Please check and try again.</p>
        </div>

        <!-- Status Card (hidden until search) -->
        <div id="trackResult" style="display: none;">
          <div class="status-card">
            <div class="status-header">
              <h3>Issue: <span id="trackType">—</span></h3>
              <span class="status-badge pending" id="trackBadge">—</span>
            </div>
            <p><strong>Location:</strong> <span id="trackLocation">—</span></p>
            <p class="status-date">Submitted: <span id="trackDate">—</span></p>
          </div>

          <!-- Progress Steps -->
          <div class="progress">
            <div class="step">Reported</div>
            <div class="step">In Progress</div>
            <div class="step">Resolved</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="aws-config.js"></script>
  <script src="api.js"></script>
  <script src="script.js"></script>
  <script>
    // Allow search on Enter key
    document.getElementById("trackInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        searchIssue();
      }
    });
  </script>
</body>

</html>
