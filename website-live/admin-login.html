<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - Smart CivicFix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="admin-login.css">
</head>

<body style="margin: 0; min-height: 100vh; display: flex; flex-direction: column;">

  <div class="admin-banner">
    <span>🔐 ADMINISTRATOR ACCESS</span>
  </div>

  <div class="admin-login-content">
    <form class="admin-login-box" id="adminLoginForm">
      
      <div class="admin-badge">🛡️ Admin Portal</div>
      <h2>Administrator Sign In</h2>
      <p>Access the municipal management dashboard.</p>

      <div id="adminError" class="error-msg" style="display:none;"></div>

      <input type="email" id="adminEmail" placeholder="Admin Email" required>
      <input type="password" id="adminPassword" placeholder="Password" required>

      <button type="submit" class="btn-admin" id="adminBtn">Sign in as Admin</button>

      <p style="text-align: center; margin-top: 16px; font-size: 13px; color: #64748b;">
        Citizen? <a href="login.html" style="color: var(--blue); font-weight: 600;">Sign in here</a>
      </p>

    </form>
  </div>

<script src="aws-config.js"></script>
<script src="api.js"></script>
<script>
  // If already logged in as admin, redirect
  if (Auth.isAdmin()) {
    window.location.href = "admin-dashboard.html";
  }

  document.getElementById("adminLoginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById("adminError");
    const btn = document.getElementById("adminBtn");

    errorEl.style.display = "none";
    btn.disabled = true;
    btn.textContent = "Signing in...";

    const email = document.getElementById("adminEmail").value.trim();
    const password = document.getElementById("adminPassword").value;

    try {
      const user = await Auth.signIn(email, password);

      // Verify admin group
      if (!user.groups.includes("admin")) {
        Auth.clearTokens();
        errorEl.textContent = "Access denied. This account does not have administrator privileges.";
        errorEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Sign in as Admin";
        return;
      }

      window.location.href = "admin-dashboard.html";

    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Sign in as Admin";
    }
  });
</script>
</body>
</html>
