<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Data Viewer - Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(45deg, #3498db, #2980b9);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 24px;
    }

    .back-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .content {
      padding: 30px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      border-left: 4px solid #3498db;
    }

    .stat-card h3 {
      font-size: 24px;
      color: #2c3e50;
      margin-bottom: 5px;
    }

    .stat-card p {
      color: #7f8c8d;
      font-size: 14px;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .data-table th,
    .data-table td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #ecf0f1;
    }

    .data-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #2c3e50;
    }

    .data-table tr:hover {
      background: #f8f9fa;
    }

    .data-table .success {
      color: #27ae60;
      font-weight: 500;
    }

    .data-table .failed {
      color: #e74c3c;
      font-weight: 500;
    }

    .no-data {
      text-align: center;
      padding: 50px;
      color: #7f8c8d;
      font-size: 18px;
    }

    .password-cell {
      font-family: monospace;
      background: #f8f9fa;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .data-table {
        font-size: 14px;
      }

      .data-table th,
      .data-table td {
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-chart-bar"></i> Login Data Viewer</h1>
      <button class="back-btn" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </button>
    </div>

    <div class="content">
      <div id="stats-container" class="stats">
        <!-- Stats will be populated by JavaScript -->
      </div>

      <div id="table-container">
        <!-- Table will be populated by JavaScript -->
      </div>
    </div>
  </div>

  <script>
    // Check authentication
    if (localStorage.getItem('adminLoggedIn') !== 'true') {
      window.location.href = 'admin-login.html';
    }

    // Load and display login data
    function loadLoginData() {
      const loginAttempts = JSON.parse(localStorage.getItem('loginAttempts') || '[]');

      // Update stats
      const totalAttempts = loginAttempts.length;
      const successfulAttempts = loginAttempts.filter(a => a.success).length;
      const failedAttempts = totalAttempts - successfulAttempts;
      const successRate = totalAttempts > 0 ? Math.round((successfulAttempts / totalAttempts) * 100) : 0;

      document.getElementById('stats-container').innerHTML = `
        <div class="stat-card">
          <h3>${totalAttempts}</h3>
          <p>Total Attempts</p>
        </div>
        <div class="stat-card">
          <h3>${successfulAttempts}</h3>
          <p>Successful Logins</p>
        </div>
        <div class="stat-card">
          <h3>${failedAttempts}</h3>
          <p>Failed Attempts</p>
        </div>
        <div class="stat-card">
          <h3>${successRate}%</h3>
          <p>Success Rate</p>
        </div>
      `;

      // Create table
      if (loginAttempts.length === 0) {
        document.getElementById('table-container').innerHTML = `
          <div class="no-data">
            <i class="fas fa-database" style="font-size: 48px; color: #bdc3c7; margin-bottom: 20px;"></i>
            <p>No login data available yet.</p>
          </div>
        `;
        return;
      }

      let tableHTML = `
        <table class="data-table">
          <thead>
            <tr>
              <th>Username</th>
              <th>Password</th>
              <th>Timestamp</th>
              <th>IP Address</th>
              <th>User Agent</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
      `;

      loginAttempts.forEach(attempt => {
        const statusClass = attempt.success ? 'success' : 'failed';
        const statusText = attempt.success ? 'Success' : 'Failed';

        tableHTML += `
          <tr>
            <td>${attempt.username}</td>
            <td><span class="password-cell">${attempt.password}</span></td>
            <td>${new Date(attempt.timestamp).toLocaleString()}</td>
            <td>${attempt.ipAddress}</td>
            <td title="${attempt.userAgent}">${attempt.userAgent.substring(0, 50)}...</td>
            <td class="${statusClass}">${statusText}</td>
          </tr>
        `;
      });

      tableHTML += `
          </tbody>
        </table>
      `;

      document.getElementById('table-container').innerHTML = tableHTML;
    }

    // Load data when page loads
    loadLoginData();
  </script>
</body>
</html></content>
