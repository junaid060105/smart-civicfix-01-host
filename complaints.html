<!DOCTYPE html>
<html>
<head>
  <title>Complaints Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
      color: white;
      padding: 30px 20px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      position: relative;
    }

    .sidebar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    .sidebar > * {
      position: relative;
      z-index: 1;
    }

    .sidebar h2 {
      font-size: 24px;
      margin-bottom: 40px;
      text-align: center;
      border-bottom: 2px solid rgba(255,255,255,0.2);
      padding-bottom: 15px;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      margin: 15px 0;
      padding: 12px 15px;
      border-radius: 8px;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.1);
      color: white;
      transform: translateX(5px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .sidebar a.active {
      background: #3498db;
      color: white;
    }

    .sidebar a i {
      margin-right: 12px;
      width: 20px;
      text-align: center;
    }

    .main {
      flex: 1;
      padding: 30px;
      background: #f8f9fa;
    }

    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header h1 {
      font-size: 28px;
      color: #2c3e50;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
      color: #2c3e50;
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #3498db;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
    }

    .logout-btn {
      background: #e74c3c;
      border: none;
      color: white;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .logout-btn:hover {
      background: #c9302c;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-left: 6px solid #3498db;
      border-radius: 18px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card.pending {
      border-left-color: #f39c12;
    }

    .card.pending::before {
      background: rgba(243, 156, 18, 0.1);
    }

    .card.resolved {
      border-left-color: #27ae60;
    }

    .card.resolved::before {
      background: rgba(39, 174, 96, 0.1);
    }

    .card h3 {
      font-size: 16px;
      color: #7f8c8d;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .card p {
      font-size: 36px;
      font-weight: bold;
      color: #2c3e50;
      margin: 0;
    }

    .card i {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 24px;
      color: rgba(52, 152, 219, 0.3);
    }

    .complaints-panel {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }

    .complaints-panel h3 {
      color: #2c3e50;
      margin-bottom: 20px;
      font-size: 20px;
    }

    .complaints-list {
      display: grid;
      gap: 15px;
    }

    .complaint-item {
      background: #f7fbff;
      border-radius: 14px;
      padding: 18px;
      display: flex;
      justify-content: space-between;
      gap: 15px;
      align-items: flex-start;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .complaint-meta {
      flex: 1;
    }

    .complaint-meta strong {
      display: block;
      margin-bottom: 8px;
      color: #2c3e50;
      font-size: 16px;
    }

    .complaint-meta small {
      display: block;
      color: #7f8c8d;
      margin-top: 4px;
    }

    .complaint-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .button-small {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
      color: white;
    }

    .button-small.resolve {
      background: #27ae60;
    }

    .button-small.remove {
      background: #e74c3c;
    }

    .button-small:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      background: #94a3b8;
    }

    .settings-card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      margin-top: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .settings-card h3 {
      font-size: 18px;
      color: #2c3e50;
      margin: 0;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #ecf0f1;
      border-radius: 999px;
      transition: background 0.3s ease;
    }

    .slider::before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s ease;
      box-shadow: 0 3px 8px rgba(0,0,0,0.12);
    }

    .toggle-switch input:checked + .slider {
      background: #3498db;
    }

    .toggle-switch input:checked + .slider::before {
      transform: translateX(22px);
    }

    .export-btn {
      background: linear-gradient(45deg, #27ae60, #2ecc71);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
    }

    .export-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(39, 174, 96, 0.4);
    }

    .export-btn:active {
      transform: translateY(0);
    }

    .export-btn i {
      margin-right: 8px;
    }

    body.dark-mode {
      background: #090b16;
    }

    body.dark-mode .sidebar {
      background: linear-gradient(180deg, #111827 0%, #16203a 100%);
      box-shadow: 2px 0 20px rgba(0,0,0,0.4);
    }

    body.dark-mode .sidebar::before {
      background: rgba(255,255,255,0.02);
    }

    body.dark-mode .sidebar a {
      color: rgba(255,255,255,0.8);
    }

    body.dark-mode .sidebar a:hover {
      background: rgba(255,255,255,0.08);
    }

    body.dark-mode .sidebar a.active {
      background: #2563eb;
    }

    body.dark-mode .main {
      background: #0f172a;
    }

    body.dark-mode .header,
    body.dark-mode .card,
    body.dark-mode .complaints-panel,
    body.dark-mode .settings-card {
      background: #111827;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    body.dark-mode .header h1,
    body.dark-mode .settings-card h3,
    body.dark-mode .card h3,
    body.dark-mode .complaints-panel h3 {
      color: #e2e8f0;
    }

    body.dark-mode .card p,
    body.dark-mode .settings-card p,
    body.dark-mode .complaint-meta strong,
    body.dark-mode .complaint-meta small,
    body.dark-mode .user-info strong,
    body.dark-mode .user-info small,
    body.dark-mode .sidebar h2,
    body.dark-mode .toggle-label {
      color: #f8fafc;
    }

    body.dark-mode .logout-btn {
      background: rgba(255,255,255,0.09);
      color: #f8fafc;
    }

    body.dark-mode .logout-btn:hover {
      background: rgba(255,255,255,0.16);
    }

    body.dark-mode .export-btn {
      background: linear-gradient(45deg, #10b981, #34d399);
    }

    body.dark-mode .export-btn:hover {
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
    }

    body.dark-mode .export-btn:nth-child(2) {
      background: linear-gradient(45deg, #f59e0b, #d97706);
    }

    body.dark-mode .export-btn:nth-child(2):hover {
      box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4);
    }

    body.dark-mode .export-btn:nth-child(3) {
      background: linear-gradient(45deg, #a855f7, #9333ea);
    }

    body.dark-mode .export-btn:nth-child(3):hover {
      box-shadow: 0 8px 25px rgba(168, 85, 247, 0.4);
    }

    body.dark-mode .complaint-item {
      background: #111827;
      color: #f8fafc;
    }

    body.dark-mode .complaint-meta small {
      color: #cbd5e1;
    }

    body.dark-mode .button-small.resolve {
      background: #10b981;
    }

    body.dark-mode .button-small.remove {
      background: #ef4444;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        padding: 20px;
      }

      .main {
        padding: 20px;
      }

      .header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }

      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <h2><i class="fas fa-tachometer-alt"></i> Admin Panel</h2>
    <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
    <a href="complaints.html" class="active"><i class="fas fa-exclamation-triangle"></i> Complaints</a>
    <a href="users.html"><i class="fas fa-users"></i> Users</a>
    <a href="#"><i class="fas fa-chart-bar"></i> Reports</a>
    <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
  </div>

  <div class="main">
    <div class="header">
      <h1><i class="fas fa-exclamation-circle"></i> Complaints Management</h1>
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">A</div>
        <div>
          <strong id="user-name">Admin User</strong>
          <br>
          <small>Administrator</small>
        </div>
        <button id="logout-btn" class="logout-btn" title="Logout">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <h3><i class="fas fa-list-ul"></i> Total Complaints</h3>
        <p id="total">0</p>
        <i class="fas fa-chart-pie"></i>
      </div>
      <div class="card pending">
        <h3><i class="fas fa-clock"></i> Pending</h3>
        <p id="pending">0</p>
        <i class="fas fa-hourglass-half"></i>
      </div>
      <div class="card resolved">
        <h3><i class="fas fa-check-circle"></i> Resolved</h3>
        <p id="resolved">0</p>
        <i class="fas fa-check"></i>
      </div>
    </div>

    <div class="complaints-panel">
      <h3><i class="fas fa-list"></i> Complaints Queue</h3>
      <div id="complaints-list" class="complaints-list"></div>
    </div>

    <div class="settings-card">
      <div>
        <h3>Admin Tools</h3>
        <p style="color: #7f8c8d; margin: 8px 0 0; font-size: 14px;">Export login data and manage system logs.</p>
      </div>
      <div class="toggle-group">
        <button id="export-login-data" class="export-btn">
          <i class="fas fa-download"></i>
          Export to Excel
        </button>
        <button id="save-local-data" class="export-btn" style="margin-left: 10px; background: linear-gradient(45deg, #f39c12, #e67e22);">
          <i class="fas fa-save"></i>
          Save Locally
        </button>
        <button onclick="window.location.href='data-viewer.html'" class="export-btn" style="margin-left: 10px; background: linear-gradient(45deg, #9b59b6, #8e44ad);">
          <i class="fas fa-eye"></i>
          View Data
        </button>
      </div>
    </div>
  </div>
</div>

<script src="admin-auth.js"></script>
</body>
</html>
