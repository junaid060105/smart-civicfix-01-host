<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Smart CivicFix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-container">
  <!-- Floating background orbs -->
  <div class="floating-orb orb-1"></div>
  <div class="floating-orb orb-2"></div>
  <div class="floating-orb orb-3"></div>
  <div class="gov-banner" style="background-color: var(--white);">
    <div class="container">
      <span class="flag-icon">🏛️</span> 
      <span class="banner-text">An official platform of the municipal government</span>
    </div>
  </div>

  <div class="login-content">
    <div class="login-box">
      
      <h2>Welcome Back 👋</h2>
      <p>Sign in to your official citizen account.</p>

      <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
        <input type="email" placeholder="Email Address" required>
        <input type="password" placeholder="Password" required>

        <button type="submit" class="btn-primary">Sign in</button>
      </form>

      <p class="extra-text">
        Don't have an account?
        <a href="signup.html">Create account</a>
      </p>

    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
