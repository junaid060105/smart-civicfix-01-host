<!DOCTYPE html>
<html>
<head>
  <title>Users Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
      color: white;
      padding: 30px 20px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      position: relative;
    }

    .sidebar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    .sidebar > * {
      position: relative;
      z-index: 1;
    }

    .sidebar h2 {
      font-size: 24px;
      margin-bottom: 40px;
      text-align: center;
      border-bottom: 2px solid rgba(255,255,255,0.2);
      padding-bottom: 15px;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      margin: 15px 0;
      padding: 12px 15px;
      border-radius: 8px;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.1);
      color: white;
      transform: translateX(5px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .sidebar a.active {
      background: #3498db;
      color: white;
    }

    .sidebar a i {
      margin-right: 12px;
      width: 20px;
      text-align: center;
    }

    .main {
      flex: 1;
      padding: 30px;
      background: #f8f9fa;
    }

    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header h1 {
      font-size: 28px;
      color: #2c3e50;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
      color: #2c3e50;
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #3498db;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
    }

    .logout-btn {
      background: #e74c3c;
      border: none;
      color: white;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .logout-btn:hover {
      background: #c9302c;
    }

    .users-panel {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    .users-panel h3 {
      margin-bottom: 20px;
      font-size: 22px;
      color: #2c3e50;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 16px 14px;
      text-align: left;
      border-bottom: 1px solid #ebeff5;
    }

    th {
      background: #f3f6ff;
      color: #2c3e50;
      font-weight: 600;
    }

    td {
      color: #4b5563;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .pill-blue {
      background: rgba(52, 144, 220, 0.12);
      color: #1d4ed8;
    }

    .pill-green {
      background: rgba(16, 185, 129, 0.12);
      color: #047857;
    }

    .action-btn {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .action-btn.remove {
      background: #e74c3c;
    }

    .action-btn.remove:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 15px rgba(231, 76, 60, 0.3);
    }

    @media (max-width: 900px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      table, th, td {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h2><i class="fas fa-tachometer-alt"></i> Admin Panel</h2>
      <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
      <a href="complaints.html"><i class="fas fa-exclamation-triangle"></i> Complaints</a>
      <a href="users.html" class="active"><i class="fas fa-users"></i> Users</a>
      <a href="#"><i class="fas fa-chart-bar"></i> Reports</a>
      <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
    </div>

    <div class="main">
      <div class="header">
        <h1><i class="fas fa-users"></i> User Directory</h1>
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">A</div>
          <div>
            <strong id="user-name">Admin User</strong>
            <br>
            <small>Administrator</small>
          </div>
          <button id="logout-btn" class="logout-btn" title="Logout">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>

      <div class="users-panel">
        <h3>Registered Users</h3>
        <table>
          <thead>
            <tr>
              <th>Username</th>
              <th>Email ID</th>
              <th>Password</th>
              <th>Total Civic Points</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="admin-auth.js"></script>
</body>
</html>
